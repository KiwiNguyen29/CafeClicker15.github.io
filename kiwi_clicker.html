<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Clicker</title>
    <link rel="stylesheet" href="kiwi_clicker.css">
</head>

<body>
    <div id="click-counter">Clicks: 0</div>
    <div id="upgrade-stats" class="stats-panel">
        <div class="stat-entry"><span class="stat-name">Click Power:</span> <span id="stat-click-power">1</span></div>
        <div class="stat-entry"><span class="stat-name">Ice Cube Bought:</span> <span id="stat-ice-count">0</span></div>
        <div class="stat-entry"><span class="stat-name">Milk Bought:</span> <span id="stat-milk-count">0</span></div>
        <div class="stat-entry"><span class="stat-name">Tea Bought:</span> <span id="stat-tea-count">0</span></div>
        <div class="stat-entry"><span class="stat-name">Coffee Bought:</span> <span id="stat-coffee-count">0</span>
        </div>
        <div class="stat-entry"><span class="stat-name">Matcha Bought:</span> <span id="stat-matcha-count">0</span>
        </div>
    </div>
    <h1>Cafe Clicker</h1>
    <div class="MainButton"><img src="Deus_Coffee.png" alt="Main Button"></div>
    <div class="container">
        <div class="upgrade-card">
            <button id="upgrade-1" class="upgrade-button" aria-label="Ice Cubes Upgrade"></button>
            <div id="upgrade-1-cost" class="upgrade-cost"></div>
        </div>
        <div class="upgrade-card">
            <button id="upgrade-2" class="upgrade-button" aria-label="Milk Upgrade"></button>
            <div id="upgrade-2-cost" class="upgrade-cost"></div>
        </div>
        <div class="upgrade-card">
            <button id="upgrade-3" class="upgrade-button" aria-label="Tea Upgrade"></button>
            <div id="upgrade-3-cost" class="upgrade-cost"></div>
        </div>
        <div class="upgrade-card">
            <button id="upgrade-4" class="upgrade-button" aria-label="Coffee Upgrade"></button>
            <div id="upgrade-4-cost" class="upgrade-cost"></div>
        </div>
        <div class="upgrade-card">
            <button id="upgrade-5" class="upgrade-button" aria-label="Matcha Upgrade"></button>
            <div id="upgrade-5-cost" class="upgrade-cost"></div>
        </div>
    </div>
    <script src="kiwi_clicker.js"></script>
</body>

</html>
